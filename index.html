<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Диагностика файла</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        .test {
            background: #16213e;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background: #764ba2;
        }
        .success {
            color: #48bb78;
        }
        .error {
            color: #f56565;
        }
        .info {
            color: #4299e1;
        }
        pre {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .file-url {
            background: #0f0f1a;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>🔍 Диагностика звукового файла</h1>
    
    <div class="test">
        <h3>📁 Пути для проверки:</h3>
        <div class="file-url" id="paths"></div>
    </div>
    
    <div class="test">
        <h3>🌐 Проверка через fetch:</h3>
        <button onclick="checkFetch('/sounds/scanner_photo1.wav')">Проверить /sounds/scanner_photo1.wav</button>
        <button onclick="checkFetch('scanner_photo1.wav')">Проверить scanner_photo1.wav (относительный)</button>
        <button onclick="checkFetch('./sounds/scanner_photo1.wav')">Проверить ./sounds/scanner_photo1.wav</button>
        <button onclick="checkFetch('../sounds/scanner_photo1.wav')">Проверить ../sounds/scanner_photo1.wav</button>
        <div id="fetchResult"></div>
    </div>
    
    <div class="test">
        <h3>🎵 Проверка через Audio элемент:</h3>
        <button onclick="testAudio('/sounds/scanner_photo1.wav')">Тест /sounds/scanner_photo1.wav</button>
        <button onclick="testAudio('scanner_photo1.wav')">Тест scanner_photo1.wav</button>
        <div id="audioResult"></div>
    </div>
    
    <div class="test">
        <h3>📂 Список возможных путей:</h3>
        <pre id="possiblePaths"></pre>
    </div>
    
    <div class="test">
        <h3>ℹ️ Информация о странице:</h3>
        <pre id="pageInfo"></pre>
    </div>
    
    <script>
        // Показываем информацию о странице
        const pageInfo = document.getElementById('pageInfo');
        pageInfo.innerHTML = `URL: ${window.location.href}\n`;
        pageInfo.innerHTML += `Путь: ${window.location.pathname}\n`;
        pageInfo.innerHTML += `Origin: ${window.location.origin}\n`;
        pageInfo.innerHTML += `Protocol: ${window.location.protocol}\n`;
        
        // Показываем возможные пути
        const possiblePaths = document.getElementById('possiblePaths');
        possiblePaths.innerHTML = `Абсолютный путь: ${window.location.origin}/sounds/scanner_photo1.wav\n`;
        possiblePaths.innerHTML += `Относительный путь: sounds/scanner_photo1.wav\n`;
        possiblePaths.innerHTML += `Текущая директория: ${window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1)}\n`;
        
        // Показываем пути
        const pathsDiv = document.getElementById('paths');
        pathsDiv.innerHTML = `Текущий URL: ${window.location.href}<br>`;
        pathsDiv.innerHTML += `Проверяемый файл: /sounds/scanner_photo1.wav<br>`;
        pathsDiv.innerHTML += `<a href="/sounds/scanner_photo1.wav" target="_blank" style="color: #4299e1;">🔗 Открыть файл напрямую</a>`;
        
        async function checkFetch(url) {
            const resultDiv = document.getElementById('fetchResult');
            resultDiv.innerHTML = `<div class="info">⏳ Проверка ${url}...</div>`;
            
            try {
                const fullUrl = url.startsWith('http') ? url : window.location.origin + (url.startsWith('/') ? url : '/' + url);
                resultDiv.innerHTML += `<div class="info">🌐 Полный URL: ${fullUrl}</div>`;
                
                const response = await fetch(url, { 
                    method: 'HEAD',
                    cache: 'no-cache'
                });
                
                if (response.ok) {
                    const contentType = response.headers.get('content-type');
                    const contentLength = response.headers.get('content-length');
                    resultDiv.innerHTML += `<div class="success">✅ Файл найден!</div>`;
                    resultDiv.innerHTML += `<div class="success">📊 Content-Type: ${contentType || 'неизвестен'}</div>`;
                    resultDiv.innerHTML += `<div class="success">📏 Размер: ${contentLength ? contentLength + ' байт' : 'неизвестен'}</div>`;
                    
                    // Пробуем получить полный файл для проверки
                    try {
                        const fullResponse = await fetch(url);
                        const blob = await fullResponse.blob();
                        resultDiv.innerHTML += `<div class="success">✅ Файл загружен полностью: ${blob.size} байт</div>`;
                        resultDiv.innerHTML += `<div class="success">🎵 MIME тип: ${blob.type || 'audio/wav'}</div>`;
                    } catch(e) {
                        resultDiv.innerHTML += `<div class="error">⚠️ Не удалось загрузить полный файл: ${e.message}</div>`;
                    }
                } else {
                    resultDiv.innerHTML += `<div class="error">❌ Файл не найден! Статус: ${response.status} ${response.statusText}</div>`;
                }
            } catch(e) {
                resultDiv.innerHTML += `<div class="error">❌ Ошибка: ${e.message}</div>`;
                resultDiv.innerHTML += `<div class="error">⚠️ Возможно, проблема с CORS или сетью</div>`;
            }
        }
        
        function testAudio(url) {
            const resultDiv = document.getElementById('audioResult');
            resultDiv.innerHTML = `<div class="info">⏳ Тестирование ${url}...</div>`;
            
            const audio = new Audio();
            const fullUrl = url.startsWith('http') ? url : window.location.origin + (url.startsWith('/') ? url : '/' + url);
            resultDiv.innerHTML += `<div class="info">🔊 Полный URL: ${fullUrl}</div>`;
            
            audio.src = url;
            audio.volume = 1;
            
            let timeout = setTimeout(() => {
                resultDiv.innerHTML += `<div class="error">❌ Таймаут загрузки (5 секунд)</div>`;
            }, 5000);
            
            audio.oncanplaythrough = () => {
                clearTimeout(timeout);
                resultDiv.innerHTML += `<div class="success">✅ Аудио загружено и готово к воспроизведению</div>`;
                
                audio.play().then(() => {
                    resultDiv.innerHTML += `<div class="success">✅ Звук воспроизводится!</div>`;
                    setTimeout(() => {
                        audio.pause();
                        resultDiv.innerHTML += `<div class="info">⏸️ Воспроизведение остановлено</div>`;
                    }, 2000);
                }).catch(err => {
                    resultDiv.innerHTML += `<div class="error">❌ Ошибка воспроизведения: ${err.message}</div>`;
                    resultDiv.innerHTML += `<div class="info">💡 Совет: нажмите на страницу перед тестом (требуется взаимодействие пользователя)</div>`;
                });
            };
            
            audio.onerror = (e) => {
                clearTimeout(timeout);
                resultDiv.innerHTML += `<div class="error">❌ Ошибка загрузки аудио</div>`;
                if (audio.error) {
                    switch(audio.error.code) {
                        case 1:
                            resultDiv.innerHTML += `<div class="error">Код 1: MEDIA_ERR_ABORTED - загрузка прервана</div>`;
                            break;
                        case 2:
                            resultDiv.innerHTML += `<div class="error">Код 2: MEDIA_ERR_NETWORK - сетевая ошибка</div>`;
                            break;
                        case 3:
                            resultDiv.innerHTML += `<div class="error">Код 3: MEDIA_ERR_DECODE - ошибка декодирования (возможно, неподдерживаемый формат)</div>`;
                            break;
                        case 4:
                            resultDiv.innerHTML += `<div class="error">Код 4: MEDIA_ERR_SRC_NOT_SUPPORTED - формат не поддерживается</div>`;
                            break;
                    }
                }
                resultDiv.innerHTML += `<div class="info">💡 Попробуйте другой формат (MP3 или OGG)</div>`;
            };
            
            audio.load();
        }
        
        // Автоматическая проверка при загрузке
        setTimeout(() => {
            checkFetch('/sounds/scanner_photo1.wav');
        }, 500);
    </script>
</body>
</html>
