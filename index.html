<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Фонарик на сайте | Вспышка телефона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 64px;
            padding: 32px 24px 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 100%;
            max-width: 380px;
            text-align: center;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #FFFFFF, #B0C4FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .sub {
            color: #8e9bb5;
            font-size: 0.9rem;
            margin-bottom: 32px;
            border-bottom: 1px dashed #2a334e;
            display: inline-block;
            padding-bottom: 6px;
        }

        .flash-btn {
            background: #1e2a3e;
            border: none;
            width: 180px;
            height: 180px;
            border-radius: 180px;
            margin: 16px auto 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.05);
            transition: transform 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }

        .flash-btn:active {
            transform: scale(0.96);
        }

        /* Иконка лампочки/вспышки */
        .icon {
            font-size: 68px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            transition: transform 0.2s;
        }

        .btn-text {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #eef5ff;
            text-shadow: 0 1px 2px black;
        }

        /* Активное состояние (фонарик включен) */
        .flash-btn.active {
            background: radial-gradient(circle at 30% 20%, #ffdd77, #ffaa33);
            box-shadow: 0 0 28px 6px rgba(255, 200, 50, 0.7), inset 0 1px 4px rgba(255,255,200,0.8);
        }

        .flash-btn.active .icon {
            transform: scale(1.02);
            filter: drop-shadow(0 0 12px gold);
        }

        .flash-btn.active .btn-text {
            color: #2c1e0a;
            text-shadow: 0 0 2px #ffd58c;
        }

        .status {
            margin-top: 24px;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 18px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            color: #ccddf8;
            font-weight: 500;
            display: inline-block;
            width: auto;
        }

        .warning {
            background: rgba(220, 90, 60, 0.25);
            margin-top: 28px;
            font-size: 0.75rem;
            padding: 10px 14px;
            border-radius: 32px;
            color: #ffb7a0;
            border-left: 3px solid #ff884d;
            text-align: left;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #5f6c8a;
        }

        button {
            background: none;
            border: none;
        }

        @media (max-width: 480px) {
            .flash-btn {
                width: 150px;
                height: 150px;
            }
            .icon {
                font-size: 54px;
            }
            .btn-text {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔦 Вспышка</h1>
    <div class="sub">управление фонариком</div>

    <button id="flashButton" class="flash-btn" aria-label="Включить вспышку">
        <div class="icon">💡</div>
        <span class="btn-text" id="buttonLabel">ВКЛ</span>
    </button>

    <div class="status" id="statusMessage">
        ⚡ Нажмите, чтобы включить фонарик
    </div>

    <div class="warning">
        📱 <strong>Важно для работы:</strong><br>
        • Сайт должен быть открыт через <strong>HTTPS</strong> (или localhost)<br>
        • Разрешите доступ к камере при запросе<br>
        • Работает в Chrome на Android, некоторые браузеры iOS не поддерживают torch
    </div>
    <div class="footer">
        Torch API • MediaStream
    </div>
</div>

<script>
    (function() {
        // DOM элементы
        const flashBtn = document.getElementById('flashButton');
        const btnLabelSpan = document.getElementById('buttonLabel');
        const statusDiv = document.getElementById('statusMessage');

        // Состояния
        let isFlashOn = false;          // горит ли фонарик сейчас
        let mediaStream = null;         // текущий видеопоток
        let videoTrack = null;           // видеотрек для управления torch
        let torchSupported = false;      // флаг, поддерживается ли torch в данном браузере

        // Функция обновления интерфейса
        function updateUI() {
            if (isFlashOn) {
                flashBtn.classList.add('active');
                btnLabelSpan.innerText = 'ВЫКЛ';
                statusDiv.innerHTML = '🔆 ФОНАРИК ВКЛЮЧЕН 🔆';
                statusDiv.style.background = "rgba(255, 200, 50, 0.2)";
                statusDiv.style.color = "#fff3cf";
            } else {
                flashBtn.classList.remove('active');
                btnLabelSpan.innerText = 'ВКЛ';
                if (torchSupported) {
                    statusDiv.innerHTML = '⚡ Фонарик выключен. Нажмите снова.';
                } else {
                    statusDiv.innerHTML = '⚠️ Torch не поддерживается в этом браузере/ОС (нужен Chrome на Android)';
                }
                statusDiv.style.background = "rgba(0, 0, 0, 0.5)";
                statusDiv.style.color = "#ccddf8";
            }
        }

        // Функция включения torch (фонарика) с уже существующим треком
        async function enableTorch() {
            if (!videoTrack) return false;
            try {
                // Применяем constraints с torch: true
                await videoTrack.applyConstraints({
                    advanced: [{ torch: true }]
                });
                isFlashOn = true;
                updateUI();
                return true;
            } catch (err) {
                console.error("Ошибка включения torch:", err);
                statusDiv.innerHTML = "❌ Не удалось включить фонарик: " + (err.message || "неизвестная ошибка");
                return false;
            }
        }

        // Функция выключения torch
        async function disableTorch() {
            if (!videoTrack) return false;
            try {
                await videoTrack.applyConstraints({
                    advanced: [{ torch: false }]
                });
                isFlashOn = false;
                updateUI();
                return true;
            } catch (err) {
                console.error("Ошибка выключения torch:", err);
                // всё равно считаем что выключили, но для UI
                isFlashOn = false;
                updateUI();
                return false;
            }
        }

        // Полная остановка и освобождение камеры
        async function stopCameraAndRelease() {
            if (videoTrack) {
                try {
                    await disableTorch(); // пробуем выключить torch перед остановкой
                } catch(e) { /* игнорим */ }
                videoTrack.stop();
                videoTrack = null;
            }
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => {
                    if (track.readyState === 'live') track.stop();
                });
                mediaStream = null;
            }
            isFlashOn = false;
            torchSupported = false;
            updateUI();
        }

        // Инициализация доступа к камере и проверка torch
        async function initTorch() {
            // Если уже есть активный трек - сначала всё освободим (чистый старт)
            if (videoTrack || mediaStream) {
                await stopCameraAndRelease();
            }

            statusDiv.innerHTML = "📷 Запрашиваем доступ к камере...";
            statusDiv.style.background = "rgba(70, 130, 200, 0.3)";

            try {
                // Запрашиваем видеопоток с задней камеры (environment)
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { exact: "environment" } }
                });
                
                mediaStream = stream;
                const tracks = stream.getVideoTracks();
                if (!tracks.length) {
                    throw new Error("Нет видеодорожек");
                }
                
                videoTrack = tracks[0];
                
                // Проверяем поддержку torch: у трека должны быть доступны capabilities
                let capabilities = null;
                try {
                    capabilities = videoTrack.getCapabilities ? videoTrack.getCapabilities() : null;
                } catch(e) { capabilities = null; }
                
                let hasTorch = false;
                if (capabilities && capabilities.torch) {
                    hasTorch = true;
                } else {
                    // Дополнительная проверка: некоторые браузеры не отдают torch в capabilities,
                    // но поддерживают через applyConstraints. Попробуем включить-выключить тест
                    // Но делать тест "включить-выключить" сразу может вызвать лишнюю вспышку,
                    // поэтому более щадящий способ: проверить через поддержку advanced constraints
                    // Но попробуем запросить torch false без ошибок.
                    try {
                        // если applyConstraints с torch не вызовет ошибку, значит поддерживается
                        await videoTrack.applyConstraints({ advanced: [{ torch: false }] });
                        hasTorch = true;
                    } catch (testErr) {
                        hasTorch = false;
                    }
                }
                
                if (!hasTorch) {
                    // Torch не поддерживается, но мы оставим возможность? нет, без torch бесполезно
                    throw new Error("Ваш браузер или устройство не поддерживают управление фонариком (torch). Нужен Chrome на Android, WebView с поддержкой.");
                }
                
                torchSupported = true;
                // Убеждаемся что фонарик выключен изначально
                await videoTrack.applyConstraints({ advanced: [{ torch: false }] });
                isFlashOn = false;
                updateUI();
                statusDiv.innerHTML = "✅ Фонарик готов! Нажмите на кнопку, чтобы включить вспышку.";
                statusDiv.style.background = "rgba(70, 200, 100, 0.2)";
                return true;
                
            } catch (err) {
                console.error("Ошибка инициализации torch / доступ к камере:", err);
                let errorMsg = "";
                if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
                    errorMsg = "Нет разрешения на использование камеры. Разрешите доступ и перезагрузите страницу.";
                } else if (err.name === "NotFoundError" || err.message.includes("environment")) {
                    errorMsg = "Не найдена задняя камера. Попробуйте на телефоне с основной камерой.";
                } else if (err.message && err.message.includes("torch")) {
                    errorMsg = "Браузер не поддерживает управление вспышкой. Используйте Chrome для Android.";
                } else {
                    errorMsg = "Ошибка: " + (err.message || "Неизвестная ошибка");
                }
                statusDiv.innerHTML = "⚠️ " + errorMsg;
                statusDiv.style.background = "rgba(200, 70, 60, 0.25)";
                torchSupported = false;
                isFlashOn = false;
                updateUI();
                // освобождаем всё что успели захватить
                if (videoTrack) {
                    videoTrack.stop();
                    videoTrack = null;
                }
                if (mediaStream) {
                    mediaStream.getTracks().forEach(t => t.stop());
                    mediaStream = null;
                }
                return false;
            }
        }

        // Обработчик клика на главную кнопку
        async function onMainButtonPress() {
            // Если torch не инициализирован или был сброшен, пробуем инициализировать
            if (!torchSupported || !videoTrack) {
                // Пытаемся получить доступ к камере и подготовить torch
                const success = await initTorch();
                if (!success) {
                    // Не удалось инициализировать, показываем ошибку (уже в статусе)
                    return;
                }
                // После успешной инициализации, если фонарик выключен, ничего не делаем? 
                // Ждём повторного клика пользователя, потому что сейчас isFlashOn = false и torch выключен.
                // Но можно сразу включить по желанию, но лучше чтобы пользователь ещё раз нажал для включения.
                // Однако UX: кликнул на кнопку "ВКЛ" -> инициализировали камеру -> фонарик всё ещё выкл.
                // Чтобы не заставлять нажимать дважды, сделаем авто-включение после успешной инициализации?
                // Правильнее: после инициализации если кнопка была нажата и мы хотим включить, то включим.
                if (!isFlashOn && torchSupported && videoTrack) {
                    await enableTorch();
                }
                return;
            }
            
            // Если уже инициализирован: переключаем состояние
            if (isFlashOn) {
                await disableTorch();
            } else {
                await enableTorch();
            }
        }
        
        // Доп. защита: если страница выгружается или пользователь закрывает вкладку — останавливаем камеру
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => {
                    if (track.stop) track.stop();
                });
            }
        });
        
        // Привязываем обработчик клика по кнопке
        flashBtn.addEventListener('click', (e) => {
            e.preventDefault();
            onMainButtonPress();
        });
        
        // Также полезно проинформировать при загрузке страницы о необходимости жеста пользователя
        // Не будем автоматически запрашивать доступ до клика — браузеры блокируют autoplay политики, но getUserMedia
        // может быть вызван по клику, и это правильно. Поэтому первый клик вызовет инициализацию + включение.
        // Это удобно: пользователь нажимает "ВКЛ", запрашивается доступ, и если всё ок — загорается фонарик.
        // Но в текущей логике onMainButtonPress вызывает initTorch, затем если инициализация успешна, то enableTorch.
        // enableTorch сработает после initTorch? Да, потому что после await initTorch внутри onMainButtonPress мы проверяем
        // условие: если (!isFlashOn && torchSupported && videoTrack) -> включаем.
        // Значит при первом нажатии произойдёт: запрос камеры -> torch выкл -> затем включение.
        
        // Выставим начальное состояние UI
        updateUI();
        statusDiv.innerHTML = "🔘 Нажмите на кнопку, чтобы включить фонарик (потребуется разрешение камеры)";
        torchSupported = false; // пока не инициализирован
        isFlashOn = false;
        
        // Примечание: Если открыть на десктопе Chrome (без камеры) — покажет ошибку, это нормально.
        // Для iOS (Safari) torch не поддерживается, выведет сообщение после попытки.
        // Дополнительно: на Android Chrome работает отлично.
    })();
</script>
</body>
</html>
