<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тестирование FlashModule - диагностика звука</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            text-align: center;
            color: white;
        }
        
        .subtitle {
            text-align: center;
            color: #a0aec0;
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .status-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .status-row:last-child {
            border-bottom: none;
        }
        
        .status-label {
            color: #cbd5e0;
            font-weight: 500;
        }
        
        .status-value {
            color: white;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        
        .status-value.success {
            color: #48bb78;
        }
        
        .status-value.error {
            color: #f56565;
        }
        
        .status-value.warning {
            color: #ed8936;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 16px 24px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        
        .log-area {
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 20px;
        }
        
        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #e2e8f0;
        }
        
        .log-entry.info {
            color: #90cdf4;
        }
        
        .log-entry.success {
            color: #9ae6b4;
        }
        
        .log-entry.error {
            color: #fc8181;
        }
        
        .log-entry.warning {
            color: #fbd38d;
        }
        
        .flash-indicator {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.01s;
            z-index: 9999;
        }
        
        .test-sound-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }
        
        .test-sound-title {
            color: white;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .file-check {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            flex-wrap: wrap;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge.success {
            background: #48bb78;
            color: white;
        }
        
        .badge.error {
            background: #f56565;
            color: white;
        }
        
        .badge.warning {
            background: #ed8936;
            color: white;
        }
        
        .volume-slider {
            width: 100%;
            margin: 12px 0;
        }
        
        hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin: 16px 0;
        }
        
        .init-error {
            background: rgba(245, 101, 101, 0.2);
            border: 1px solid #f56565;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            color: #fc8181;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔦 FlashModule Тест</h1>
        <div class="subtitle">Тестирование вспышки и звука из /sounds/scanner_photo1.wav</div>
        
        <div class="status-card">
            <div class="status-row">
                <span class="status-label">📹 Камера:</span>
                <span class="status-value" id="cameraStatus">—</span>
            </div>
            <div class="status-row">
                <span class="status-label">🔊 Torch API:</span>
                <span class="status-value" id="torchStatus">—</span>
            </div>
            <div class="status-row">
                <span class="status-label">🎵 Звуковой файл:</span>
                <span class="status-value" id="soundFileStatus">—</span>
            </div>
            <div class="status-row">
                <span class="status-label">🎚️ Громкость:</span>
                <span class="status-value" id="volumeValue">0.8</span>
            </div>
        </div>
        
        <div class="test-sound-card">
            <div class="test-sound-title">🎵 Тестирование звука без вспышки</div>
            <div class="button-group">
                <button id="testSoundOnlyBtn" class="btn-secondary">▶️ Только звук (файл)</button>
                <button id="testBuiltinSoundBtn" class="btn-secondary">🎹 Только звук (встроенный)</button>
            </div>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
            <div class="file-check" id="fileCheckDisplay">
                🔍 Проверка файла...
            </div>
        </div>
        
        <div class="button-group">
            <button id="playBtn" class="btn-primary">⚡ ВСПЫШКА + ЗВУК (файл)</button>
            <button id="playBuiltinBtn" class="btn-primary">⚡ ВСПЫШКА + ЗВУК (встроенный)</button>
            <button id="flashOnlyBtn" class="btn-danger">💡 Только вспышка</button>
            <button id="releaseBtn" class="btn-secondary">🔒 Освободить камеру</button>
            <button id="reinitBtn" class="btn-secondary">🔄 Переинициализировать</button>
        </div>
        
        <div class="log-area" id="logArea">
            <div class="log-entry info">🚀 Модуль загружен, начинаем тестирование...</div>
        </div>
    </div>
    
    <div class="flash-indicator" id="flashIndicator"></div>
    
    <script>
        // ==================== FlashModule КЛАСС (встроенный) ====================
        class FlashModule {
            constructor(options = {}) {
                this.options = {
                    soundPath: '/sounds/',
                    soundFile: null,
                    flashDuration: 200,
                    soundVolume: 0.8,
                    useBuiltinSound: true,
                    builtinSoundDuration: 3000,
                    builtinSoundFrequency: 880,
                    onReady: null,
                    onError: null,
                    onSoundStart: null,
                    onSoundEnd: null,
                    onFlashStart: null,
                    onFlashEnd: null,
                    debug: false,
                    ...options
                };

                this.videoTrack = null;
                this.mediaStream = null;
                this.torchReady = false;
                this.isFlashing = false;
                this.isPlaying = false;
                this.audioElement = null;
                this.audioCtx = null;
                this.useBuiltin = !this.options.soundFile;
                
                this.initCamera = this.initCamera.bind(this);
                this.play = this.play.bind(this);
                this.blink = this.blink.bind(this);
                this.playSound = this.playSound.bind(this);
                this.setSound = this.setSound.bind(this);
                this.releaseCamera = this.releaseCamera.bind(this);
                
                if (options.autoInit) {
                    this.initCamera();
                }
            }
            
            async setSound(fileName) {
                if (!fileName) {
                    this.useBuiltin = true;
                    this.options.soundFile = null;
                    this._log("Переключено на встроенный звук");
                    return true;
                }
                
                this.options.soundFile = fileName;
                const exists = await this._checkSoundFile(fileName);
                
                if (exists) {
                    this.useBuiltin = false;
                    this._log(`Звук установлен: ${fileName}`);
                    return true;
                } else {
                    this._log(`Файл ${fileName} не найден, используем встроенный звук`);
                    this.useBuiltin = true;
                    return false;
                }
            }
            
            async _checkSoundFile(fileName) {
                const url = this.getSoundUrl(fileName);
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    return response.ok;
                } catch(e) {
                    return false;
                }
            }
            
            getSoundUrl(fileName = null) {
                const file = fileName || this.options.soundFile;
                if (!file) return null;
                const basePath = this.options.soundPath.replace(/\/$/, '');
                return `${basePath}/${file}`;
            }
            
            async initCamera() {
                if (this.videoTrack && this.torchReady && this.videoTrack.readyState === 'live') {
                    return true;
                }
                
                if (this.videoTrack || this.mediaStream) {
                    await this.releaseCamera();
                }
                
                this._log("Инициализация камеры...");
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: { exact: "environment" } }
                    });
                    
                    this.mediaStream = stream;
                    const tracks = stream.getVideoTracks();
                    
                    if (!tracks.length) {
                        throw new Error("Нет видеодорожек");
                    }
                    
                    this.videoTrack = tracks[0];
                    
                    let torchSupported = false;
                    try {
                        const caps = this.videoTrack.getCapabilities ? this.videoTrack.getCapabilities() : null;
                        if (caps && caps.torch === true) torchSupported = true;
                    } catch(e) {}
                    
                    if (!torchSupported) {
                        try {
                            await this.videoTrack.applyConstraints({ advanced: [{ torch: false }] });
                            torchSupported = true;
                        } catch(e) {}
                    }
                    
                    if (!torchSupported) {
                        throw new Error("Torch API не поддерживается (нужен Android Chrome)");
                    }
                    
                    await this.videoTrack.applyConstraints({ advanced: [{ torch: false }] });
                    this.torchReady = true;
                    
                    this._log("Камера готова");
                    if (this.options.onReady) this.options.onReady();
                    return true;
                    
                } catch (err) {
                    this._logError("Ошибка:", err);
                    if (this.options.onError) this.options.onError(err);
                    return false;
                }
            }
            
            async _setTorch(state) {
                if (!this.torchReady || !this.videoTrack) {
                    throw new Error("Камера не готова");
                }
                await this.videoTrack.applyConstraints({
                    advanced: [{ torch: state }]
                });
            }
            
            async blink(durationMs = null) {
                const flashTime = durationMs !== null ? durationMs : this.options.flashDuration;
                
                if (this.isFlashing) return false;
                
                if (!this.torchReady) {
                    const success = await this.initCamera();
                    if (!success) return false;
                }
                
                this.isFlashing = true;
                if (this.options.onFlashStart) this.options.onFlashStart(flashTime);
                
                try {
                    await this._setTorch(true);
                    await new Promise(r => setTimeout(r, flashTime));
                    await this._setTorch(false);
                    if (this.options.onFlashEnd) this.options.onFlashEnd(flashTime);
                    return true;
                } catch (err) {
                    this._logError("Ошибка вспышки:", err);
                    try { await this._setTorch(false); } catch(e) {}
                    return false;
                } finally {
                    this.isFlashing = false;
                }
            }
            
            async playSound(fileName = null) {
                const targetFile = fileName || this.options.soundFile;
                
                if (targetFile && !this.useBuiltin) {
                    const success = await this._playFileSound(targetFile);
                    if (success) return;
                    this.useBuiltin = true;
                }
                
                return this._playBuiltinSound();
            }
            
            async _playFileSound(fileName) {
                return new Promise((resolve) => {
                    const soundUrl = this.getSoundUrl(fileName);
                    if (!soundUrl) {
                        resolve(false);
                        return;
                    }
                    
                    const audio = new Audio();
                    audio.src = soundUrl;
                    audio.volume = this.options.soundVolume;
                    
                    let resolved = false;
                    
                    const onEnded = () => {
                        if (resolved) return;
                        resolved = true;
                        cleanup();
                        if (this.options.onSoundEnd) this.options.onSoundEnd();
                        resolve(true);
                    };
                    
                    const onError = (e) => {
                        if (resolved) return;
                        resolved = true;
                        cleanup();
                        this._log(`Файл ${fileName} не воспроизвёлся: ${e?.message || 'неизвестная ошибка'}`);
                        resolve(false);
                    };
                    
                    const cleanup = () => {
                        audio.removeEventListener('ended', onEnded);
                        audio.removeEventListener('error', onError);
                    };
                    
                    audio.addEventListener('ended', onEnded);
                    audio.addEventListener('error', onError);
                    
                    audio.play().catch(onError);
                    
                    if (this.options.onSoundStart) this.options.onSoundStart(fileName);
                    
                    setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            cleanup();
                            if (!audio.paused) audio.pause();
                            resolve(false);
                        }
                    }, 10000);
                });
            }
            
            async _playBuiltinSound() {
                const duration = this.options.builtinSoundDuration;
                const frequency = this.options.builtinSoundFrequency;
                
                if (!window.AudioContext && !window.webkitAudioContext) {
                    this._log("Web Audio не поддерживается");
                    return false;
                }
                
                if (!this.audioCtx) {
                    try {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch(e) {
                        this._logError("Не удалось создать AudioContext");
                        return false;
                    }
                }
                
                if (this.audioCtx.state === 'suspended') {
                    await this.audioCtx.resume();
                }
                
                return new Promise((resolve) => {
                    const now = this.audioCtx.currentTime;
                    const durationSec = duration / 1000;
                    
                    const gainNode = this.audioCtx.createGain();
                    gainNode.gain.setValueAtTime(this.options.soundVolume, now);
                    const fadeStart = Math.max(0, durationSec - 0.3);
                    gainNode.gain.setValueAtTime(this.options.soundVolume, now + fadeStart);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + durationSec);
                    
                    const oscillator = this.audioCtx.createOscillator();
                    oscillator.type = 'sine';
                    oscillator.frequency.value = frequency;
                    oscillator.connect(gainNode);
                    gainNode.connect(this.audioCtx.destination);
                    oscillator.start();
                    oscillator.stop(now + durationSec);
                    
                    if (this.options.onSoundStart) this.options.onSoundStart('[встроенный звук]');
                    
                    setTimeout(() => {
                        if (this.options.onSoundEnd) this.options.onSoundEnd();
                        resolve(true);
                    }, duration + 20);
                });
            }
            
            async play() {
                if (this.isPlaying) {
                    this._log("Уже выполняется");
                    return false;
                }
                
                this.isPlaying = true;
                
                const cameraPromise = this.initCamera();
                
                await this.playSound();
                
                await cameraPromise;
                await new Promise(r => setTimeout(r, 40));
                const result = await this.blink();
                
                this.isPlaying = false;
                return result;
            }
            
            async releaseCamera() {
                if (this.videoTrack) {
                    try {
                        await this._setTorch(false);
                        this.videoTrack.stop();
                    } catch(e) {}
                    this.videoTrack = null;
                }
                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }
                this.torchReady = false;
            }
            
            destroy() {
                this.releaseCamera();
                if (this.audioCtx) {
                    this.audioCtx.close().catch(()=>{});
                    this.audioCtx = null;
                }
                this.isPlaying = false;
                this.isFlashing = false;
            }
            
            setFlashDuration(ms) {
                this.options.flashDuration = ms;
            }
            
            getFlashDuration() {
                return this.options.flashDuration;
            }
            
            setVolume(vol) {
                this.options.soundVolume = Math.min(1, Math.max(0, vol));
            }
            
            isTorchSupported() {
                return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
            }
            
            _log(...args) {
                if (this.options.debug) console.log("[FlashModule]", ...args);
            }
            
            _logError(...args) {
                console.error("[FlashModule]", ...args);
            }
        }

        // ==================== ТЕСТОВЫЙ СКРИПТ ====================
        let flashModule = null;
        
        const cameraStatusEl = document.getElementById('cameraStatus');
        const torchStatusEl = document.getElementById('torchStatus');
        const soundFileStatusEl = document.getElementById('soundFileStatus');
        const volumeValueEl = document.getElementById('volumeValue');
        const volumeSlider = document.getElementById('volumeSlider');
        const logArea = document.getElementById('logArea');
        const flashIndicator = document.getElementById('flashIndicator');
        
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${timestamp}] ${message}`;
            logArea.appendChild(logEntry);
            logArea.scrollTop = logArea.scrollHeight;
            
            while (logArea.children.length > 100) {
                logArea.removeChild(logArea.firstChild);
            }
            
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        function visualFlash(duration = 200) {
            flashIndicator.style.transition = `opacity ${duration}ms`;
            flashIndicator.style.opacity = '1';
            setTimeout(() => {
                flashIndicator.style.opacity = '0';
            }, duration);
        }
        
        async function checkSoundFile() {
            const soundUrl = '/sounds/scanner_photo1.wav';
            addLog(`🔍 Проверка файла: ${soundUrl}`, 'info');
            
            try {
                const response = await fetch(soundUrl, { method: 'HEAD' });
                if (response.ok) {
                    addLog(`✅ Файл найден!`, 'success');
                    soundFileStatusEl.innerHTML = '<span class="badge success">✅ Файл найден</span><br><span style="font-size:11px">/sounds/scanner_photo1.wav</span>';
                    
                    try {
                        const testFetch = await fetch(soundUrl);
                        const blob = await testFetch.blob();
                        addLog(`📊 Тип файла: ${blob.type}, размер: ${blob.size} байт`, 'info');
                        if (blob.size === 0) {
                            addLog(`⚠️ Файл пустой (0 байт)!`, 'warning');
                        }
                    } catch(e) {
                        addLog(`⚠️ Не удалось загрузить файл: ${e.message}`, 'warning');
                    }
                    return true;
                } else {
                    addLog(`❌ Файл не найден! Статус: ${response.status}`, 'error');
                    soundFileStatusEl.innerHTML = '<span class="badge error">❌ Файл НЕ найден</span><br><span style="font-size:11px">/sounds/scanner_photo1.wav</span>';
                    return false;
                }
            } catch(e) {
                addLog(`❌ Ошибка проверки: ${e.message}`, 'error');
                soundFileStatusEl.innerHTML = '<span class="badge error">⚠️ Ошибка проверки</span>';
                return false;
            }
        }
        
        function updateCameraStatus() {
            if (!flashModule) {
                cameraStatusEl.innerHTML = '<span class="badge warning">⚠️ Модуль не инициализирован</span>';
                torchStatusEl.innerHTML = '<span class="badge warning">❓ Неизвестно</span>';
                return;
            }
            
            if (flashModule.torchReady && flashModule.videoTrack) {
                cameraStatusEl.innerHTML = '<span class="badge success">✅ Готова</span>';
                torchStatusEl.innerHTML = '<span class="badge success">✅ Поддерживается</span>';
            } else if (flashModule.videoTrack) {
                cameraStatusEl.innerHTML = '<span class="badge warning">⚠️ Инициализация...</span>';
                torchStatusEl.innerHTML = '<span class="badge warning">⚠️ Проверка...</span>';
            } else {
                cameraStatusEl.innerHTML = '<span class="badge warning">⏳ Не инициализирована</span>';
                torchStatusEl.innerHTML = '<span class="badge warning">❓ Неизвестно</span>';
            }
        }
        
        async function testSoundOnly() {
            addLog(`🎵 Тестирование звукового файла...`, 'info');
            
            if (!flashModule) {
                addLog(`❌ Модуль не инициализирован`, 'error');
                return;
            }
            
            flashModule.useBuiltin = false;
            flashModule.options.soundFile = 'scanner_photo1.wav';
            flashModule.options.debug = true;
            
            addLog(`🔊 Воспроизведение: /sounds/scanner_photo1.wav`, 'info');
            
            const result = await flashModule.playSound('scanner_photo1.wav');
            
            if (result) {
                addLog(`✅ Звук успешно воспроизведён!`, 'success');
            } else {
                addLog(`❌ Звук НЕ воспроизвёлся!`, 'error');
                addLog(`🔧 Возможные причины:`, 'error');
                addLog(`   1. Файл повреждён или имеет неподдерживаемый формат`, 'error');
                addLog(`   2. Путь к файлу неверный`, 'error');
                addLog(`   3. Браузер блокирует автоматическое воспроизведение`, 'error');
                
                const audio = new Audio('/sounds/scanner_photo1.wav');
                audio.volume = volumeSlider.value;
                audio.play().then(() => {
                    addLog(`✅ Альтернативный способ сработал!`, 'success');
                    setTimeout(() => audio.pause(), 3000);
                }).catch(err => {
                    addLog(`❌ Альтернативный способ: ${err.message}`, 'error');
                });
            }
        }
        
        async function testBuiltinSound() {
            addLog(`🎹 Тестирование встроенного звука...`, 'info');
            
            if (!flashModule) {
                addLog(`❌ Модуль не инициализирован`, 'error');
                return;
            }
            
            const oldUseBuiltin = flashModule.useBuiltin;
            flashModule.useBuiltin = true;
            
            const result = await flashModule.playSound();
            
            if (result) {
                addLog(`✅ Встроенный звук воспроизведён`, 'success');
            } else {
                addLog(`❌ Встроенный звук не воспроизвёлся`, 'error');
            }
            
            flashModule.useBuiltin = oldUseBuiltin;
        }
        
        async function testFullPlay(useBuiltin = false) {
            if (!flashModule) {
                addLog(`❌ Модуль не инициализирован`, 'error');
                return;
            }
            
            addLog(`🎬 Запуск: ${useBuiltin ? 'встроенный звук' : 'файл scanner_photo1.wav'} + вспышка`, 'info');
            
            if (!useBuiltin) {
                flashModule.useBuiltin = false;
                flashModule.options.soundFile = 'scanner_photo1.wav';
            } else {
                flashModule.useBuiltin = true;
            }
            
            flashModule.options.onFlashStart = (duration) => {
                addLog(`💡 Вспышка на ${duration}мс`, 'info');
                visualFlash(duration);
            };
            flashModule.options.onFlashEnd = () => addLog(`💡 Вспышка выключена`, 'info');
            flashModule.options.onSoundStart = (sound) => addLog(`🔊 Звук начал: ${sound}`, 'success');
            flashModule.options.onSoundEnd = () => addLog(`🔇 Звук закончился`, 'info');
            
            const result = await flashModule.play();
            
            if (result) {
                addLog(`✅ Тест успешен!`, 'success');
            } else {
                addLog(`❌ Тест не удался`, 'error');
            }
            
            setTimeout(() => {
                flashModule.options.onSoundStart = null;
                flashModule.options.onSoundEnd = null;
                flashModule.options.onFlashStart = null;
                flashModule.options.onFlashEnd = null;
            }, 1000);
        }
        
        async function testFlashOnly() {
            if (!flashModule) {
                addLog(`❌ Модуль не инициализирован`, 'error');
                return;
            }
            
            addLog(`💡 Тестирование только вспышки...`, 'info');
            
            const success = await flashModule.initCamera();
            if (!success) {
                addLog(`❌ Не удалось инициализировать камеру`, 'error');
                return;
            }
            
            addLog(`✨ Вспышка на ${flashModule.options.flashDuration}мс`, 'info');
            visualFlash(flashModule.options.flashDuration);
            
            const result = await flashModule.blink();
            if (result) {
                addLog(`✅ Вспышка сработала`, 'success');
            } else {
                addLog(`❌ Вспышка не сработала`, 'error');
            }
        }
        
        async function init() {
            addLog(`🚀 Инициализация FlashModule...`, 'info');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                addLog(`❌ Браузер не поддерживает getUserMedia`, 'error');
                addLog(`💡 Используйте Chrome на Android`, 'warning');
                return;
            }
            
            flashModule = new FlashModule({
                soundPath: '/sounds/',
                soundFile: 'scanner_photo1.wav',
                flashDuration: 200,
                soundVolume: 0.8,
                useBuiltinSound: true,
                debug: true,
                onReady: () => {
                    addLog(`✅ Камера готова!`, 'success');
                    updateCameraStatus();
                },
                onError: (err) => {
                    addLog(`❌ Ошибка камеры: ${err.message}`, 'error');
                    updateCameraStatus();
                }
            });
            
            addLog(`✅ Модуль создан`, 'success');
            updateCameraStatus();
            
            await checkSoundFile();
            
            setTimeout(() => {
                if (!flashModule.torchReady) {
                    addLog(`🔄 Фоновая инициализация камеры...`, 'info');
                    flashModule.initCamera();
                }
            }, 1000);
        }
        
        function setupEventHandlers() {
            document.getElementById('playBtn').onclick = () => testFullPlay(false);
            document.getElementById('playBuiltinBtn').onclick = () => testFullPlay(true);
            document.getElementById('flashOnlyBtn').onclick = () => testFlashOnly();
            document.getElementById('testSoundOnlyBtn').onclick = () => testSoundOnly();
            document.getElementById('testBuiltinSoundBtn').onclick = () => testBuiltinSound();
            document.getElementById('releaseBtn').onclick = () => {
                if (flashModule) {
                    flashModule.releaseCamera();
                    addLog(`🔒 Камера освобождена`, 'info');
                    updateCameraStatus();
                }
            };
            document.getElementById('reinitBtn').onclick = async () => {
                if (flashModule) {
                    await flashModule.releaseCamera();
                    await flashModule.initCamera();
                    addLog(`🔄 Камера переинициализирована`, 'info');
                    updateCameraStatus();
                }
            };
            
            volumeSlider.oninput = (e) => {
                const vol = parseFloat(e.target.value);
                if (flashModule) flashModule.setVolume(vol);
                volumeValueEl.textContent = vol.toFixed(2);
            };
        }
        
        init();
        setupEventHandlers();
        
        addLog(`📱 User Agent: ${navigator.userAgent}`, 'info');
        addLog(`🔊 AudioContext: ${window.AudioContext ? 'доступен' : 'недоступен'}`, 'info');
    </script>
</body>
</html>
